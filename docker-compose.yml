services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: mini_erp_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
    networks:
      - erp_net

  nginx:
    image: nginx:1.27-alpine
    container_name: mini_erp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - app_storage:/var/www/html/storage:ro
      - nginx_logs:/var/log/nginx
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - erp_net

  db:
    image: postgres:16-alpine
    container_name: mini_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-mini_erp_db}
      POSTGRES_USER: ${DB_USERNAME:-erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-erp_user} -d ${DB_DATABASE:-mini_erp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_net

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: mini_erp_queue
    restart: unless-stopped
    env_file: .env
    command: php artisan queue:work database --sleep=3 --tries=3 --timeout=90
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
    networks:
      - erp_net

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: mini_erp_scheduler
    restart: unless-stopped
    env_file: .env
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
    networks:
      - erp_net

  certbot:
    image: certbot/certbot:latest
    container_name: mini_erp_certbot
    profiles: ["ssl"]
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  db_data:
  app_storage:
  app_bootstrap_cache:
  nginx_logs:
  certbot_certs:
  certbot_webroot:

networks:
  erp_net:
    driver: bridge
