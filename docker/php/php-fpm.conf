[www]
user = www-data
group = www-data
listen = 0.0.0.0:9000

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Log slow requests (> 5s)
slowlog = /var/log/php-fpm-slow.log
request_slowlog_timeout = 5s

; Env clearing (security)
clear_env = no
